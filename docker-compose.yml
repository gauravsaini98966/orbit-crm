version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: orbit-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: orbit-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/orbit_crm
      CORS_ORIGIN: http://localhost:5173,http://localhost:80
      ADMIN_KEY: change_this_admin_key
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: orbit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo_data:
